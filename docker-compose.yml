# Postgres local para desarrollo. Levántalo con: docker compose up -d
services:
  db:
    image: postgres:16-alpine
    container_name: cuidado_mataro_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cuidado_mataro
    ports:
      - "5432:5432"
    volumes:
      - cuidado_pgdata:/var/lib/postgresql/data

volumes:
  cuidado_pgdata:
